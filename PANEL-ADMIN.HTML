<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Panel Admin | MARCOSMETIC</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- BOXICONS -->

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
        rel='stylesheet'>

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/styles.css">

</head>

<body class="admin-body">

    <!-- SIDEBAR -->

    <aside class="sidebar-admin">

        <h2>

            MARCOSMETIC

        </h2>

        <ul>

            <li class="active">

                <i class='bx bx-grid-alt'></i>

                Dashboard

            </li>

            <li>

                <i class='bx bx-package'></i>

                Productos

            </li>

            <li>

                <i class='bx bx-cart'></i>

                Ventas

            </li>

            <li>

                <i class='bx bx-user'></i>

                Clientes

            </li>

            <li>

                <i class='bx bx-cog'></i>

                Configuración

            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="admin-main">

        <!-- TOPBAR -->

        <div class="admin-topbar">

            <h1>

                Panel Administrativo

            </h1>

            <button class="btn btn-dark">

                <i class='bx bx-plus'></i>

                Nuevo Producto

            </button>

        </div>

        <!-- STATS -->

        <div class="stats-grid">

            <div class="stat-card">

                <h3>

                    124

                </h3>

                <p>

                    Productos

                </p>

            </div>

            <div class="stat-card">

                <h3>

                    57

                </h3>

                <p>

                    Ventas

                </p>

            </div>

            <div class="stat-card">

                <h3>

                    230

                </h3>

                <p>

                    Clientes

                </p>

            </div>

        </div>

        <!-- FORM PRODUCTOS -->

        <section class="admin-form-section">

            <h2>

                Agregar Producto

            </h2>

            <form class="admin-form">

                <input type="text"
                    placeholder="Nombre del producto">

                <input type="number"
                    placeholder="Precio">

                <input type="number"
                    placeholder="Stock">

                <select>

                    <option>

                        Categoría

                    </option>

                    <option>

                        Makeup

                    </option>

                    <option>

                        Skincare

                    </option>

                    <option>

                        Perfumes

                    </option>

                </select>

                <textarea placeholder="Descripción"></textarea>

                <!-- IMAGEN -->

                <input type="file">

                <!-- BOTON -->

                <button class="btn btn-dark">

                    Guardar Producto

                </button>

            </form>

        </section>

        <!-- TABLA -->

        <section class="tabla-productos">

            <h2>

                Gestionar Productos

            </h2>

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>Imagen</th>

                        <th>Producto</th>

                        <th>Precio</th>

                        <th>Stock</th>

                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>

                            <img src="assets/img/producto1.jpg"
                                width="60">

                        </td>

                        <td>

                            Labial Matte

                        </td>

                        <td>

                            $24.999

                        </td>

                        <td>

                            15

                        </td>

                        <td>

                            <button class="btn btn-warning">

                                Editar

                            </button>

                            <button class="btn btn-danger">

                                Eliminar

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </section>

    </main>

    <!-- JS -->

    <script src="js/script.js"></script>

</body>

</html>
