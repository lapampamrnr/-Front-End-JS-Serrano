<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Registro | MARCOSMETIC</title>

    <!-- CSS -->

    <link rel="stylesheet"
        href="css/styles.css">

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="login-body">

    <section class="register-section">

        <div class="register-container">

            <h1>

                Crear Cuenta ✨

            </h1>

            <p>

                Registrate para comprar y guardar favoritos.

            </p>

            <!-- FORM -->

            <form id="registerForm">

                <input type="text"
                    id="nombre"
                    placeholder="Nombre completo"
                    required>

                <input type="email"
                    id="email"
                    placeholder="Correo electrónico"
                    required>

                <input type="password"
                    id="password"
                    placeholder="Contraseña"
                    required>

                <input type="password"
                    id="confirmPassword"
                    placeholder="Confirmar contraseña"
                    required>

                <!-- CHECK -->

                <label class="check-terms">

                    <input type="checkbox"
                        required>

                    Acepto términos y condiciones

                </label>

                <!-- BOTON -->

                <button type="submit"
                    class="btn-login">

                    Registrarme

                </button>

            </form>

            <div class="register-link">

                ¿Ya tenés cuenta?

                <a href="login.html">

                    Iniciar sesión

                </a>

            </div>

        </div>

    </section>

    <!-- JS -->

    <script src="js/script.js"></script>

</body>

</html>
